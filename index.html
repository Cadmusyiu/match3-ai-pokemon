<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pokemon Match 3</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: linear-gradient(135deg, #1a1a2e, #16213e); 
  min-height: 100vh; 
  display: flex; 
  justify-content: center; 
  align-items: center;
  font-family: Arial, sans-serif;
}
#game {
  width: 350px;
  background: linear-gradient(180deg, #1e3a5f, #152238);
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
  margin-bottom: 10px;
}
#score { font-size: 20px; font-weight: bold; color: #ffd700; }
#combo { font-size: 16px; color: #ff6b6b; min-width: 60px; text-align: right; }
#grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  padding: 8px;
  background: rgba(0,0,0,0.4);
  border-radius: 10px;
  aspect-ratio: 1;
}
.gem {
  aspect-ratio: 1;
  border-radius: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 32px;
  cursor: pointer;
  user-select: none;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 3px 6px rgba(0,0,0,0.3);
  background-size: 85% 85%;
  background-position: center;
  background-repeat: no-repeat;
}
.gem:active { transform: scale(0.92); }
.gem.selected {
  transform: scale(1.1);
  box-shadow: 0 0 20px rgba(255,255,255,0.8);
  z-index: 10;
}
.gem.path-gem {
  box-shadow: 0 0 15px rgba(255,215,0,0.8), inset 0 0 10px rgba(255,215,0,0.3);
  transform: scale(1.08);
}
.gem.matched { animation: pop 0.3s forwards; }
.gem.falling { animation: fall 0.4s; }
@keyframes pop {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.5; }
  100% { transform: scale(0); opacity: 0; }
}
@keyframes fall {
  0% { transform: translateY(-60px); opacity: 0; }
  70% { transform: translateY(5px); opacity: 1; }
  100% { transform: translateY(0); }
}
.type-0 { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
.type-1 { background: linear-gradient(135deg, #74b9ff, #0984e3); }
.type-2 { background: linear-gradient(135deg, #55efc4, #00b894); }
.type-3 { background: linear-gradient(135deg, #feca57, #f39c12); }
.type-4 { background: linear-gradient(135deg, #a29bfe, #6c5ce7); }
.type-5 { background: linear-gradient(135deg, #dfe6e9, #b2bec3); }
#modes {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.mode-btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  font-size: 14px;
}
.mode-btn.c { background: rgba(255,255,255,0.1); color: white; }
.mode-btn.h { background: rgba(255,215,0,0.2); color: #ffd700; }
.mode-btn.h.active { background: rgba(255,215,0,0.5); }
#msg {
  margin-top: 10px;
  padding: 8px;
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  font-size: 12px;
  color: #0f0;
  min-height: 40px;
  word-wrap: break-word;
}
</style>
</head>
<body>
<div id="game">
  <div id="header">
    <div id="score">Score: 0</div>
    <div id="combo"></div>
  </div>
  <div id="grid"></div>
  <div id="modes">
    <button class="mode-btn c" onclick="setMode('classic')">🎯 Classic</button>
    <button class="mode-btn h" id="hintBtn" onclick="setMode('hint')">💡 Hint</button>
  </div>
  <div id="msg">Debug info will appear here</div>
</div>

<script>
const POKEMON = [
  { id: 25, name: 'Pikachu' },   // Electric - yellow mouse
  { id: 4, name: 'Charmander' }, // Fire - orange lizard  
  { id: 7, name: 'Squirtle' },   // Water - blue turtle
  { id: 1, name: 'Bulbasaur' },   // Grass - green bulb
  { id: 150, name: 'Mewtwo' },     // Psychic - alien head
  { id: 143, name: 'Snorlax' }     // Normal - sleeping face
];

function getPokemonImg(id) {
  return `img/p${id}.png`;
}
const COLS = 5, ROWS = 5;

let grid = [], els = [], score = 0, combo = 0;
let path = [], isDragging = false, mode = 'classic', processing = false;
let hintEl = null;

const gridEl = document.getElementById('grid');
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const msgEl = document.getElementById('msg');

function log(m) {
  msgEl.innerHTML = m;
  console.log(m);
}

function init() {
  grid = [];
  els = [];
  gridEl.innerHTML = '';
  score = 0;
  combo = 0;
  path = [];
  updateScore();
  
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    els[r] = [];
    for (let c = 0; c < COLS; c++) {
      let t;
      do {
        t = Math.floor(Math.random() * 6);
      } while (
        (c >= 2 && grid[r][c-1] === t && grid[r][c-2] === t) ||
        (r >= 2 && grid[r-1][c] === t && grid[r-2][c] === t)
      );
      grid[r][c] = t;
      
      const d = document.createElement('div');
      d.className = 'gem type-' + t;
      d.style.backgroundImage = 'url("' + getPokemonImg(POKEMON[t].id) + '")';
      d.dataset.r = r;
      d.dataset.c = c;
      d.addEventListener('touchstart', e => { e.preventDefault(); startDrag(e, d); }, {passive:false});
      d.addEventListener('touchmove', e => { e.preventDefault(); moveDrag(e); }, {passive:false});
      d.addEventListener('touchend', endDrag);
      d.addEventListener('mousedown', e => startDrag(e, d));
      gridEl.appendChild(d);
      els[r][c] = d;
    }
  }
  log('Game started! Drag gems to shift them.');
}

function startDrag(e, el) {
  if (processing) return;
  isDragging = true;
  path = [];
  
  const r = parseInt(el.dataset.r);
  const c = parseInt(el.dataset.c);
  addToPath(r, c, el);
  
  document.addEventListener('mousemove', moveDrag);
  document.addEventListener('mouseup', endDrag);
}

function addToPath(r, c, el) {
  if (path.some(p => p.r === r && p.c === c)) return;
  
  const last = path[path.length - 1];
  if (last) {
    const dr = Math.abs(r - last.r);
    const dc = Math.abs(c - last.c);
    if (!((dr === 1 && dc === 0) || (dr === 0 && dc === 1))) return;
    
    // Backtrack
    if (path.length >= 2) {
      const prev = path[path.length - 2];
      if (prev.r === r && prev.c === c) {
        path.pop();
        els[path[path.length-1].r][path[path.length-1].c].classList.remove('path-gem');
        updatePathNums();
        return;
      }
    }
  }
  
  path.push({r, c});
  el.classList.add('path-gem');
  updatePathNums();
}

function updatePathNums() {
  els.forEach(row => row.forEach(el => {
    el.style.position = '';
    const num = el.querySelector('.num');
    if (num) num.remove();
  }));
  path.forEach((p, i) => {
    els[p.r][p.c].classList.add('path-gem');
  });
}

function moveDrag(e) {
  if (!isDragging) return;
  e.preventDefault();
  
  const rect = gridEl.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  const cw = rect.width / COLS;
  const ch = rect.height / ROWS;
  
  const c = Math.floor(x / cw);
  const r = Math.floor(y / ch);
  
  if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
    addToPath(r, c, els[r][c]);
  }
}

function endDrag(e) {
  if (!isDragging) return;
  document.removeEventListener('mousemove', moveDrag);
  document.removeEventListener('mouseup', endDrag);
  isDragging = false;
  
  if (path.length >= 2) {
    doShift();
  } else {
    clearPath();
  }
}

function clearPath() {
  path.forEach(p => els[p.r][p.c].classList.remove('path-gem'));
  path = [];
}

async function doShift() {
  processing = true;
  log('Shifting path length ' + path.length + '...');
  
  // CIRCULAR SHIFT: first gem goes to last position
  const first = grid[path[0].r][path[0].c];
  
  // Shift forward
  for (let i = 0; i < path.length - 1; i++) {
    grid[path[i].r][path[i].c] = grid[path[i+1].r][path[i+1].c];
  }
  grid[path[path.length-1].r][path[path.length-1].c] = first;
  
      els[p.r][p.c].classList.remove('path-gem');
  }
  
  // Update DOM with actual Pokemon images
  for (let i = 0; i < path.length; i++) {
    const p = path[i];
    const t = grid[p.r][p.c];
    els[p.r][p.c].className = 'gem type-' + t;
    els[p.r][p.c].style.backgroundImage = 'url("' + getPokemonImg(POKEMON[t].id) + '")';
    els[p.r][p.c].classList.remove('path-gem');
  }
  
  log('Shift done. Checking matches...');
  await sleep(200);
  
  const matches = findMatches();
  if (matches.length > 0) {
    await processMatches(matches);
  }
  
  path = [];
  if (mode === 'hint') showHint();
  processing = false;
}

function findMatches() {
  const m = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      const t = grid[r][c];
      if (t !== null && t === grid[r][c+1] && t === grid[r][c+2]) {
        m.push({r,c},{r,c:c+1},{r,c:c+2});
      }
    }
  }
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      const t = grid[r][c];
      if (t !== null && t === grid[r+1][c] && t === grid[r+2][c]) {
        m.push({r,c},{r:r+1,c},{r:r+2,c});
      }
    }
  }
  // Dedupe
  const seen = new Set();
  return m.filter(p => {
    const k = p.r+','+p.c;
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });
}

async function processMatches(m) {
  let round = 0;
  while (m.length > 0) {
    round++;
    combo = round;
    score += m.length * 50 + (round > 1 ? round * 50 : 0);
    updateScore();
    log('Round ' + round + '! Matches: ' + m.length + ', Score: ' + score);
    
    // Animate
    m.forEach(p => els[p.r][p.c].classList.add('matched'));
    await sleep(350);
    
    // Remove
    m.forEach(p => grid[p.r][p.c] = null);
    
    // Drop
    for (let c = 0; c < COLS; c++) {
      let empty = 0;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (grid[r][c] === null) empty++;
        else if (empty > 0) {
          grid[r+empty][c] = grid[r][c];
          grid[r][c] = null;
        }
      }
      for (let r = 0; r < empty; r++) {
        grid[r][c] = Math.floor(Math.random() * 6);
      }
    }
    
    // Update DOM
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const t = grid[r][c];
        els[r][c].className = 'gem type-' + t + ' falling';
        els[r][c].style.backgroundImage = 'url("' + getPokemonImg(POKEMON[t].id) + '")';
        setTimeout(() => els[r][c].classList.remove('falling'), 400);
      }
    }
    
    await sleep(400);
    m = findMatches();
  }
}

function updateScore() {
  scoreEl.textContent = 'Score: ' + score;
  comboEl.textContent = combo > 1 ? combo + 'x' : '';
}

function findHint() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      // Try right
      if (c < COLS - 1) {
        swap(r, c, r, c+1);
        if (findMatches().length > 0) { swap(r, c, r, c+1); return {r1:r,c1:c,r2:r,c2:c+1}; }
        swap(r, c, r, c+1);
      }
      // Try down
      if (r < ROWS - 1) {
        swap(r, c, r+1, c);
        if (findMatches().length > 0) { swap(r, c, r+1, c); return {r1:r,c1:c,r2:r+1,c2:c}; }
        swap(r, c, r+1, c);
      }
    }
  }
  return null;
}

function swap(r1,c1,r2,c2) {
  const t = grid[r1][c1];
  grid[r1][c1] = grid[r2][c2];
  grid[r2][c2] = t;
}

function showHint() {
  if (hintEl) { hintEl.style.boxShadow = ''; hintEl = null; }
  const h = findHint();
  if (h) {
    hintEl = els[h.r1][h.c1];
    hintEl.style.boxShadow = '0 0 0 4px #ffd700, 0 0 20px #ffd700';
  }
}

function setMode(m) {
  mode = m;
  document.getElementById('hintBtn').classList.toggle('active', m === 'hint');
  if (m === 'hint') showHint();
  else if (hintEl) { hintEl.style.boxShadow = ''; hintEl = null; }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

init();
</script>
</body>
</html>
